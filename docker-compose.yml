services:
  app:
    image: ghcr.io/periicles/petfriendlylocator:latest
    restart: always
    container_name: petfriendlylocator_app
    env_file:
      - .env
    ports:
      - '3000:3000'
    depends_on:
      - db
    environment:
      DATABASE_URL: postgres://petuser:petpassword@db:5432/petdb?schema=public

  db:
    image: postgres:16
    restart: always
    container_name: petfriendlylocator_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - backend

volumes:
  pgdata:

networks:
  backend:
