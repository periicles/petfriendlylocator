image: docker:28.3.0

services:
  - docker:dind

variables:
  DOCKER_TLS_CERTDIR: ''
  IMAGE_NAME: $CI_REGISTRY_IMAGE/petfriendlylocator

stages:
  # - lint
  # - secrets
  - build
  - publish

